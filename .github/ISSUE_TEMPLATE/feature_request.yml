name: Feature Request
description: Suggest an idea or feature for this integration
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
    validations:
      required: true
  - type: dropdown
    id: physical_device
    attributes:
      label: Can you test this against a physical device?
      description: Since most features are developed based on protocol structures, verification against real hardware is extremely valuable.
      options:
        - "Yes, I own a compatible Panasonic AC and can test/provide logs."
        - "No, I do not have a physical device to test with."
    validations:
      required: true
